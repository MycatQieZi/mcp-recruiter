# ── MCP Recruiter Sample Job Description ──
# This file defines the "job posting" used to search for and evaluate
# MCP tool candidates.

title: "文件系统与搜索 MCP 服务器"

problem_statement: >
  需要找一个能够提供文件系统操作和搜索能力的 MCP 服务器，
  用于工具调用场景，支持 stdio 传输，最好是活跃维护的开源项目。

# 必需能力 — 候选人提供的工具应覆盖这些关键词
required_capabilities:
  - "文件读取"
  - "搜索"
  - "文件系统"

# 加分能力
preferred_capabilities:
  - "文件写入"
  - "目录遍历"
  - "通配符搜索"

# 硬性过滤条件 — 不满足的直接淘汰
hard_requirements:
  min_stars: 10
  max_days_since_update: 365
  min_tool_count: 2
  require_license: true

# 进入笔试环节的候选人数上限
top_n_candidates: 5

# 笔试测试场景
test_scenarios:
  - name: "基础文件读取"
    description: "测试能否正常读取文件内容"
    test_cases:
      - name: "读取测试文件"
        mcp_tool_name: "read_file"
        expected_behavior: "no_error"

  - name: "搜索功能"
    description: "测试搜索功能是否正常"
    test_cases:
      - name: "搜索文本文件"
        mcp_tool_name: "search_files"
        expected_behavior: "no_error"

# 评分权重 (可选，不指定则使用 balanced 默认值)
scoring_weights:
  capability: 0.30
  health: 0.15
  ecosystem: 0.15
  test: 0.40
